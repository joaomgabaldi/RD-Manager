<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RD Player</title>
  <style>
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%; 
      background: #000; 
      display: flex; 
      flex-direction: column; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
      overflow: hidden; 
      box-sizing: border-box;
    }
    
    #header { 
      padding: 12px 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: #111; 
      border-bottom: 1px solid #333; 
      flex-shrink: 0; 
      z-index: 20;
    }
    
    #title { 
      font-size: 15px; 
      font-weight: 500; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap; 
      max-width: 60%; 
      color: #eee; 
    }
    
    .actions { display: flex; gap: 10px; }
    
    .btn { 
      background: #1a9c4a; 
      color: #fff; 
      border: none; 
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 13px; 
      text-decoration: none; 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
      transition: opacity 0.2s; 
    }
    
    .btn:hover { opacity: 0.85; }
    .btn-vlc { background: #ff8800; }
    
    .video-container { 
      flex: 1; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      background: #000; 
      position: relative; 
      overflow: hidden;
    }
    
    /* Esconde o cursor quando o player estiver inativo */
    .video-container.idle { cursor: none; }
    
    video { 
      width: 100%; 
      height: 100%; 
      outline: none; 
      z-index: 1; 
      background: #000;
    }
    
    .icon { width: 16px; height: 16px; fill: currentColor; }
    .icon-stroke { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    /* Controles Customizados */
    .custom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
      padding: 40px 20px 15px 20px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: opacity 0.3s ease;
    }
    
    .video-container.idle .custom-controls {
      opacity: 0;
      pointer-events: none;
    }
    
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: height 0.1s ease;
    }
    
    .progress-container:hover {
      height: 8px;
    }
    
    .progress-filled {
      height: 100%;
      background: #1a9c4a;
      border-radius: 3px;
      width: 0%;
      pointer-events: none;
    }
    
    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .ctrl-btn {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, opacity 0.2s;
    }
    
    .ctrl-btn:hover { color: #1a9c4a; }
    .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .ctrl-btn.disabled { opacity: 0.3; cursor: not-allowed; }
    .ctrl-btn.disabled:hover { color: #fff; }
    
    .time-display {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }
    
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .volume-slider {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #1a9c4a;
    }
    
    /* Estilos do Drag and Drop de Legendas */
    #drag-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      color: #1a9c4a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-in-out;
      z-index: 10;
      border: 4px dashed #1a9c4a;
      box-sizing: border-box;
    }
    #drag-overlay.active { opacity: 1; }
  </style>
</head>
<body>
  <div id="header">
    <div id="title" class="title" data-i18n="loading"></div>
    <div class="actions">
      <a href="#" id="btn-vlc" class="btn btn-vlc" data-i18n-title="openInVlc">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L4 20h16L12 2z M4 15h16 M6 10h12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span data-i18n="openInVlc">VLC</span>
      </a>
      <a href="#" id="btn-dl" class="btn" data-i18n-title="download">
        <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M12 3v10"/><polyline points="8 9 12 14 16 9"/><path d="M3 17v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/></svg>
        <span data-i18n="download">Download</span>
      </a>
    </div>
  </div>
  
  <div class="video-container" id="drop-zone">
    <video id="player" autoplay></video>
    
    <div id="custom-controls" class="custom-controls">
      <div class="progress-container" id="progress-container">
        <div class="progress-filled" id="progress-filled"></div>
      </div>
      
      <div class="controls-row">
        <div class="controls-left">
          <button id="btn-play-pause" class="ctrl-btn">
            <svg id="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
          </button>
          
          <div class="volume-container">
            <button id="btn-mute" class="ctrl-btn">
              <svg id="icon-vol-high" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
              <svg id="icon-vol-mute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>
          
          <span id="time-display" class="time-display">00:00 / 00:00</span>
        </div>
        
        <div class="controls-right">
          <button id="btn-cc" class="ctrl-btn disabled" title="Legendas (Nenhuma carregada)">
            <svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1.5c0 .28-.22.5-.5.5h-3c-.28 0-.5-.22-.5-.5v-4c0-.28.22-.5.5-.5h3c.28 0 .5.22.5.5V11zm7 0h-1.5v-.5h-2v3h2V13H18v1.5c0 .28-.22.5-.5.5h-3c-.28 0-.5-.22-.5-.5v-4c0-.28.22-.5.5-.5h3c.28 0 .5.22.5.5V11z"/></svg>
          </button>
          <button id="btn-fullscreen" class="ctrl-btn">
            <svg id="icon-fs-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            <svg id="icon-fs-exit" viewBox="0 0 24 24" style="display:none;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="drag-overlay">
      <svg class="icon-stroke" viewBox="0 0 24 24" style="width: 64px; height: 64px; margin-bottom: 16px;">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span data-i18n="dropSubtitleHere"></span>
    </div>
  </div>

  <script type="module" src="player.js"></script>
</body>
</html>
