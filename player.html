<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RD Manager Player</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="plyr.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #drop-zone {
      flex: 1;
      position: relative;
    }
    #player {
      width: 100%;
      height: 100%;
    }
    .header {
      padding: 10px 20px;
      background: rgba(30, 30, 30, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      z-index: 10;
    }
    #title {
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 20px;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    #drag-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 123, 255, 0.3);
      border: 2px dashed #007bff;
      display: none;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 24px;
      pointer-events: none;
      z-index: 100;
    }
    #drag-overlay.active {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="header">
    <div id="title">RD Manager Player</div>
    <div class="actions">
      <a id="btn-dl" class="btn" download data-i18n="btnDownload">Download</a>
      <a id="btn-vlc" class="btn">VLC</a>
    </div>
  </div>

  <div class="main-container">
    <div id="drop-zone">
      <div id="drag-overlay" data-i18n="dropSubtitleHint">Solte a legenda aqui</div>
      <video id="player" playsinline controls></video>
    </div>
  </div>

  <script src="plyr.js"></script>
  <script type="module" src="player.js"></script>
</body>
</html>
