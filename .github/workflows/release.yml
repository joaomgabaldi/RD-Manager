name: Build and Release Extension

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Tipo de incremento (build: 1.0.0.x, patch: 1.0.x, minor: 1.x.0, major: x.0.0)'
        required: true
        type: choice
        options:
          - build
          - patch
          - minor
          - major
      changelog:
        description: 'Changelog: Descreva as alterações desta versão'
        required: false
        default: 'Atualizações e correções gerais.'
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calcular nova versão
        id: calc_version
        run: |
          CURRENT_VERSION=$(jq -r '.version' manifest_ff.json)
          IFS='.' read -ra VER <<< "$CURRENT_VERSION"
          
          MAJOR="${VER[0]:-0}"
          MINOR="${VER[1]:-0}"
          PATCH="${VER[2]:-0}"
          BUILD="${VER[3]:-0}"
          
          if [ "${{ github.event.inputs.bump_type }}" == "major" ]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
            BUILD=0
          elif [ "${{ github.event.inputs.bump_type }}" == "minor" ]; then
            MINOR=$((MINOR+1))
            PATCH=0
            BUILD=0
          elif [ "${{ github.event.inputs.bump_type }}" == "patch" ]; then
            PATCH=$((PATCH+1))
            BUILD=0
          elif [ "${{ github.event.inputs.bump_type }}" == "build" ]; then
            BUILD=$((BUILD+1))
          fi
          
          if [ "$BUILD" -gt 0 ]; then
            NEW_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"
          else
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          
          echo "Versão anterior detectada: $CURRENT_VERSION"
          echo "Nova versão calculada: $NEW_VERSION"
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update manifests version
        run: |
          jq '.version = "${{ env.NEW_VERSION }}"' manifest_ff.json > manifest_tmp_ff.json && mv manifest_tmp_ff.json manifest_ff.json
          jq '.version = "${{ env.NEW_VERSION }}"' manifest_chromium.json > manifest_tmp_chromium.json && mv manifest_tmp_chromium.json manifest_chromium.json

      - name: Commit and Push updated manifests
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add manifest_ff.json manifest_chromium.json
          git commit -m "chore: atualiza versão dos manifests para ${{ env.NEW_VERSION }}" || echo "Nenhuma mudança nos manifests"
          git push

      - name: Create ZIP archives
        run: |
          cp manifest_ff.json manifest.json
          zip -r release-firefox-${{ env.NEW_VERSION }}.zip . -x "README.md" -x ".git/*" -x ".github/*" -x "manifest_ff.json" -x "manifest_chromium.json"
          
          cp manifest_chromium.json manifest.json
          zip -r release-chromium-${{ env.NEW_VERSION }}.zip . -x "README.md" -x ".git/*" -x ".github/*" -x "manifest_ff.json" -x "manifest_chromium.json"
          
          rm manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          body: ${{ github.event.inputs.changelog }}
          files: |
            release-firefox-${{ env.NEW_VERSION }}.zip
            release-chromium-${{ env.NEW_VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
