name: Update Plyr Assets

on:
  schedule:
    - cron: '0 0 * * 0' # Executa todo domingo à meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  update-plyr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest Plyr Assets
        run: |
          curl -L https://cdn.plyr.io/3.7.8/plyr.js -o plyr.js
          curl -L https://cdn.plyr.io/3.7.8/plyr.css -o plyr.css
          curl -L https://cdn.plyr.io/3.7.8/plyr.svg -o plyr.svg

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add plyr.js plyr.css plyr.svg
          if git diff --cached --quiet; then
            echo "Nenhuma alteração detectada."
          else
            git commit -m "chore: update plyr assets (js, css, svg) to latest version"
            git push
          fi
